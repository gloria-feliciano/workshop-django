<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog da Letícia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        *{
            margin: 0 auto;
        }
        header{
            background-color: black;
            color: #fff;
            text-align: center;
            padding: 10px;
        }
        main{
            width: 700px;
        }

        section{
                        margin: 20px 0;
        }

        h1 a, h2{
            color: #C25100; 
        }

        p{
            color:blueviolet;
        }
    </style>

</head>
<body>
    <header>
        <a href="/"><h1>Blog da Glória</h1></a>
    </header>
    <main>
        <section>         
            <a href="post/{{post.id}}"><h1>{{post.title}}</h1></a>
            <h5>{{post.post.published_date}}</h5>

        <p>
            {{post.text}}
        </p>
    </section>
    </main>
</body>
</html>
